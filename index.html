<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharon · online shopping</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #ffdcd0 0%, #ffe9cf 40%, #efd4ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .shopping-system {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 250, 240, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 45px -15px #c46b45, 0 10px 25px -8px #b282b9;
      padding: 2rem 2.2rem 2.5rem;
      border: 2px solid #ffe1b8;
      transition: all 0.3s ease;
    }

    .system-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1.8rem;
      padding-bottom: 0.75rem;
      border-bottom: 4px solid #fcb38b;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .system-title i {
      color: #c44f1c;
      font-size: 2.2rem;
      background: #ffe0b5;
      padding: 0.6rem;
      border-radius: 50%;
    }
    .system-title span {
      background: linear-gradient(130deg, #c0442b, #cf6f97, #7d4b9c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ----- navigation (all interactive) ----- */
    .icon-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: space-between;
      align-items: center;
      background: #ffe9d7;
      padding: 0.9rem 1.8rem;
      border-radius: 4rem;
      margin-bottom: 2rem;
      box-shadow: 0 12px 22px -10px #f09d78, inset 0 2px 0 #fff7e6;
      border: 1px solid #fecab0;
    }

    .nav-items {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .icon-btn {
      background: rgba(255, 215, 185, 0.8);
      border: 1px solid #ffb082;
      font-size: 1.6rem;
      color: #732f12;
      width: 3.3rem;
      height: 3.3rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .icon-btn::after {
      content: attr(data-label);
      position: absolute;
      bottom: -2rem;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: #1e0f08;
      color: #ffe3c0;
      font-size: 0.7rem;
      padding: 0.25rem 0.9rem;
      border-radius: 2rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
    }

    .icon-btn:hover::after {
      opacity: 1;
      bottom: -2.4rem;
      transform: translateX(-50%) scale(1);
    }

    .icon-btn:hover {
      background: #ffb48a;
      transform: translateY(-4px);
      border-color: #f57c40;
    }
    .icon-btn:active { transform: scale(0.92); background: #fb9367; }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: #ffffffd9;
      border-radius: 3rem;
      padding-left: 1.2rem;
      border: 2px solid #ffb185;
    }
    .search-wrapper input {
      border: none;
      background: transparent;
      padding: 0.6rem 0.2rem;
      font-size: 0.95rem;
      width: 170px;
      outline: none;
      color: #351c10;
    }
    .search-wrapper button {
      background: #e57646;
      border: none;
      color: white;
      border-radius: 3rem;
      width: 2.7rem;
      height: 2.7rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .search-wrapper button:hover { background: #cd5722; transform: scale(0.94);}

    /* ----- category chips (now fully interactive & take to sections) ----- */
    .menu-panel {
      background: #ffd5b3;
      border-radius: 3rem;
      padding: 0.8rem 2rem;
      margin: 1rem 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
      border: 2px solid #ff9762;
    }
    .category-chips { display: flex; gap: 0.7rem; flex-wrap: wrap; }
    .chip {
      background: #fffbf0;
      border-radius: 2rem;
      padding: 0.5rem 1.6rem;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid #fc9a64;
      color: #2d160b;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 4px 8px #e69463;
    }
    .chip:hover {
      background: #f2945e;
      color: white;
      border-color: #c45d28;
      transform: scale(1.02);
    }
    .chip.active-cat {
      background: #b84f22;
      color: white;
      border-color: #642b0c;
    }

    /* ----- add-item panel with picture & price ----- */
    .add-with-picture {
      background: #ffc8aa;
      border-radius: 2.5rem;
      padding: 1.2rem 2rem;
      margin: 1.5rem 0 2rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.2rem 2rem;
      border: 2px solid #ffa066;
    }
    .picture-upload {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      flex: 2 1 300px;
    }
    .file-label {
      background: #a5542e;
      color: white;
      padding: 0.5rem 1.3rem;
      border-radius: 3rem;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid #facaad;
    }
    .file-label i { margin-right: 0.3rem; }
    .upload-input { display: none; }

    .add-item-details {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      background: #fff1e0;
      padding: 0.5rem 1.2rem;
      border-radius: 3rem;
    }
    .add-item-details input {
      border: 2px solid #e09264;
      background: white;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      width: 140px;
      font-size: 0.9rem;
    }
    .add-item-details input::placeholder { color: #ad6e4b; }
    .upload-btn {
      background: #f07b48;
      border: none;
      color: white;
      padding: 0.6rem 1.7rem;
      border-radius: 3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      box-shadow: 0 6px 16px #c15223;
      border: 1px solid #feb27b;
    }
    .upload-btn:hover { background: #cf5d2c; }
    #uploadStatus { font-weight: 500; color: #432011; background: #fce3cf; padding: 0.3rem 1.2rem; border-radius: 4rem;}

    /* ----- product grid (sections) ----- */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 2rem 1.5rem;
      margin: 1.5rem 0 2rem;
    }
    .product-card {
      background: #fffbee;
      border-radius: 2rem;
      padding: 1.3rem 1rem 1.3rem;
      box-shadow: 0 20px 25px -12px #c26e46, 0 0 0 2px #ffe3c4 inset;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 2px solid #feba8b;
    }
    .product-card[data-category] { display: flex; } /* visible by default, filter via JS */
    .product-card.hidden-cat { display: none; }

    .product-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #ffdac2;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.8rem;
      font-size: 2.8rem;
      color: #853f1a;
      border: 4px solid #fca975;
      overflow: hidden;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-title { font-weight: 700; font-size: 1.2rem; color: #3a1f0e; }
    .product-price {
      font-weight: 700; color: #c44f1c; margin: 0.5rem 0 1rem;
      font-size: 1.3rem; background: #ffeee1; padding: 0.2rem 1.2rem; border-radius: 4rem;
    }
    .product-price::before { content: 'R'; margin-right: 0.15rem; }
    .add-btn {
      background: #d9602b; border: none; color: white; padding: 0.6rem 1.5rem;
      border-radius: 2.5rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer; transition: 0.15s; box-shadow: 0 8px 18px #c15320;
    }
    .add-btn:hover { background: #bc4718; gap: 0.9rem; }

    /* cart preview */
    .cart-preview {
      background: #fed7ba; border-radius: 2rem; padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
      border: 2px solid #fb9f6b; margin-top: 1.5rem;
    }
    .cart-info { display: flex; align-items: center; gap: 1rem; font-weight: 600; color: #3f1f0a; }
    .cart-info i { font-size: 2rem; color: #b24918; background: #fff6e0; padding: 0.5rem; border-radius: 50%; }
    .cart-items-list { display: flex; gap: 1rem; flex-wrap: wrap; }
    .sample-item { background: #fae1c9; border-radius: 3rem; padding: 0.3rem 1rem; border: 2px solid #fca56e; }

    .feedback-toast {
      position: fixed; bottom: 25px; right: 25px; background: #29180d; color: #ffdabb;
      padding: 0.9rem 2.2rem; border-radius: 3rem; font-size: 1rem; box-shadow: 0 10px 22px #9e4f28;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
    }
  </style>
</head>
<body>
<div class="shopping-system">
  <div class="system-title"><i class="fas fa-bag-shopping"></i><span>Sharon’s online shopping system</span></div>

  <!-- icon nav (all interactive) -->
  <div class="icon-nav">
    <div class="nav-items">
      <button class="icon-btn" data-label="Home" id="homeBtn"><i class="fas fa-home"></i></button>
      <button class="icon-btn" data-label="Search" id="searchIconBtn"><i class="fas fa-search"></i></button>
      <button class="icon-btn" data-label="Add item" id="addIconBtn"><i class="fas fa-plus-circle"></i></button>
      <button class="icon-btn" data-label="Cart" id="cartIconBtn"><i class="fas fa-shopping-cart"></i></button>
      <button class="icon-btn" data-label="Menu" id="menuIconBtn"><i class="fas fa-bars"></i></button>
      <button class="icon-btn profile-icon" data-label="Profile" id="profileBtn"><i class="fas fa-user-circle"></i></button>
    </div>
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search items..." id="searchInput">
      <button id="searchGo"><i class="fas fa-arrow-right"></i></button>
    </div>
  </div>

  <!-- category chips (now sections: click filters) -->
  <div class="menu-panel">
    <span><i class="fas fa-compass"></i> shop by section</span>
    <div class="category-chips" id="categoryChips">
      <div class="chip active-cat" data-cat="all">All</div>
      <div class="chip" data-cat="fashion"><i class="fas fa-tshirt"></i> Fashion</div>
      <div class="chip" data-cat="electronics"><i class="fas fa-laptop"></i> Electronics</div>
      <div class="chip" data-cat="home"><i class="fas fa-couch"></i> Home</div>
      <div class="chip" data-cat="sports"><i class="fas fa-dumbbell"></i> Sports</div>
    </div>
  </div>

  <!-- ADD ITEM with PICTURE & PRICE (NEW: include price field) -->
  <div class="add-with-picture">
    <span><i class="fas fa-image"></i> Add custom item</span>
    <div class="picture-upload">
      <label for="productImageUpload" class="file-label"><i class="fas fa-cloud-upload-alt"></i> Choose image</label>
      <input type="file" id="productImageUpload" class="upload-input" accept="image/*">
      <div class="add-item-details">
        <input type="text" id="newItemName" placeholder="Item name" value="Photo item">
        <input type="number" id="newItemPrice" placeholder="Price R" value="129.99" step="0.01" min="0">
      </div>
      <button class="upload-btn" id="uploadProductBtn"><i class="fas fa-plus-circle"></i> Add with details</button>
      <span id="uploadStatus"><i class="fa-regular fa-eye"></i> no file</span>
    </div>
  </div>

  <!-- PRODUCT GRID with internet images & categories -->
  <div class="product-grid" id="productGrid">
    <!-- fashion -->
    <div class="product-card" data-category="fashion" data-product-name="Linen blouse">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1598554747436-c9293d6a588f?w=200&h=200&fit=crop&auto=format" alt="blouse" loading="lazy"></div>
      <div class="product-title">Linen blouse</div>
      <div class="product-price">399.90</div>
      <button class="add-btn" data-product="Linen blouse"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <div class="product-card" data-category="fashion" data-product-name="Denim jeans">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=200&h=200&fit=crop&auto=format" alt="jeans" loading="lazy"></div>
      <div class="product-title">Denim jeans</div>
      <div class="product-price">799.00</div>
      <button class="add-btn" data-product="Denim jeans"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <!-- electronics -->
    <div class="product-card" data-category="electronics" data-product-name="Headphones">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200&h=200&fit=crop&auto=format" alt="headphones" loading="lazy"></div>
      <div class="product-title">Headphones</div>
      <div class="product-price">899.00</div>
      <button class="add-btn" data-product="Headphones"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <div class="product-card" data-category="electronics" data-product-name="Smart watch">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&h=200&fit=crop&auto=format" alt="watch" loading="lazy"></div>
      <div class="product-title">Smart watch</div>
      <div class="product-price">1299.00</div>
      <button class="add-btn" data-product="Smart watch"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <!-- home -->
    <div class="product-card" data-category="home" data-product-name="Ceramic mug">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=200&h=200&fit=crop&auto=format" alt="mug" loading="lazy"></div>
      <div class="product-title">Ceramic mug</div>
      <div class="product-price">145.50</div>
      <button class="add-btn" data-product="Ceramic mug"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <div class="product-card" data-category="home" data-product-name="Cushion cover">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1584102275572-6f2b28c6ee22?w=200&h=200&fit=crop&auto=format" alt="cushion" loading="lazy"></div>
      <div class="product-title">Cushion cover</div>
      <div class="product-price">249.99</div>
      <button class="add-btn" data-product="Cushion cover"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <!-- sports -->
    <div class="product-card" data-category="sports" data-product-name="Yoga mat">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1601925260368-ae2f83cf8b7f?w=200&h=200&fit=crop&auto=format" alt="yoga mat" loading="lazy"></div>
      <div class="product-title">Yoga mat</div>
      <div class="product-price">349.00</div>
      <button class="add-btn" data-product="Yoga mat"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
    <div class="product-card" data-category="sports" data-product-name="Dumbbell set">
      <div class="product-image"><img src="https://images.unsplash.com/photo-1586401100295-7a8096fd231a?w=200&h=200&fit=crop&auto=format" alt="dumbbell" loading="lazy"></div>
      <div class="product-title">Dumbbell set</div>
      <div class="product-price">599.00</div>
      <button class="add-btn" data-product="Dumbbell set"><i class="fas fa-plus-circle"></i> Add</button>
    </div>
  </div>

  <!-- cart preview -->
  <div class="cart-preview">
    <div class="cart-info"><i class="fas fa-shopping-bag"></i><span>Your cart · <span id="cartCount">0</span> items</span></div>
    <div class="cart-items-list" id="cartItemsList"><span class="sample-item"><i class="fa-regular fa-circle"></i> empty</span></div>
  </div>
  <div class="feedback-toast" id="toastMsg">✨ ready</div>
</div>

<script>
(function() {
  // ---- data & helpers ----
  const toast = document.getElementById('toastMsg');
  const cartCountSpan = document.getElementById('cartCount');
  const cartItemsDiv = document.getElementById('cartItemsList');
  let cartItems = [];

  function showToast(text) { toast.style.opacity = '1'; toast.innerText = text; setTimeout(() => toast.style.opacity = '0', 1800); }
  function updateCartDisplay() {
    cartCountSpan.innerText = cartItems.length;
    if (cartItems.length === 0) { cartItemsDiv.innerHTML = `<span class="sample-item"><i class="fa-regular fa-circle"></i> empty</span>`; return; }
    let html = '';
    cartItems.slice(-3).forEach(item => html += `<span class="sample-item"><i class="fas fa-check-circle" style="color:#c44f1c;"></i> ${item}</span>`);
    if (cartItems.length > 3) html += `<span class="sample-item"><i class="fas fa-ellipsis-h"></i> +${cartItems.length-3}</span>`;
    cartItemsDiv.innerHTML = html;
  }

  // ---- SECTION FILTER (fully interactive) ----
  const chips = document.querySelectorAll('.chip');
  const products = document.querySelectorAll('.product-card');
  function filterCategory(cat) {
    products.forEach(p => {
      if (cat === 'all' || p.dataset.category === cat) p.classList.remove('hidden-cat');
      else p.classList.add('hidden-cat');
    });
    chips.forEach(c => {
      c.classList.remove('active-cat');
      if (c.dataset.cat === cat) c.classList.add('active-cat');
    });
  }
  chips.forEach(chip => {
    chip.addEventListener('click', (e) => {
      const cat = chip.dataset.cat;
      filterCategory(cat);
      showToast(`📌 showing ${cat === 'all' ? 'all items' : cat}`);
    });
  });

  // ---- all icon buttons interactive ----
  document.getElementById('homeBtn').addEventListener('click', ()=> { filterCategory('all'); showToast('🏠 home (all items)'); });
  document.getElementById('searchIconBtn').addEventListener('click', ()=> document.getElementById('searchInput').focus());
  document.getElementById('addIconBtn').addEventListener('click', ()=> {
    // quick add random from existing products
    const randomProd = ['Linen blouse','Headphones','Yoga mat'][Math.floor(Math.random()*3)];
    cartItems.push(randomProd); updateCartDisplay(); showToast(`➕ ${randomProd} added`);
  });
  document.getElementById('cartIconBtn').addEventListener('click', ()=> showToast(`🛒 ${cartItems.length} item(s)`));
  const menuBtn = document.getElementById('menuIconBtn');
  const menuPanel = document.querySelector('.menu-panel');
  menuBtn.addEventListener('click', ()=> {
    if (menuPanel.style.display === 'none') { menuPanel.style.display = 'flex'; showToast('📋 menu opened'); }
    else { menuPanel.style.display = 'none'; showToast('📋 menu closed'); }
  });
  document.getElementById('profileBtn').addEventListener('click', ()=> showToast('👤 Sharon’s profile'));

  // search
  document.getElementById('searchGo').addEventListener('click', ()=> {
    let q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) { showToast('🔍 type something'); return; }
    let found = false;
    products.forEach(p => {
      if (p.dataset.productName && p.dataset.productName.toLowerCase().includes(q)) {
        p.classList.remove('hidden-cat');
        found = true;
      } else if (!p.dataset.productName?.toLowerCase().includes(q) && !q.includes('all')) {
        p.classList.add('hidden-cat');
      }
    });
    if (!found) showToast('🔎 no matches');
    else showToast(`🔍 showing "${q}"`);
  });

  // ---- add to cart from product buttons ----
  document.querySelectorAll('.add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const product = btn.getAttribute('data-product') || 'item';
      cartItems.push(product);
      updateCartDisplay();
      showToast(`➕ ${product} added`);
    });
  });

  // ---- ADD ITEM with PICTURE & PRICE (fully functional) ----
  const fileInput = document.getElementById('productImageUpload');
  const uploadBtn = document.getElementById('uploadProductBtn');
  const uploadStatus = document.getElementById('uploadStatus');
  const newItemName = document.getElementById('newItemName');
  const newItemPrice = document.getElementById('newItemPrice');

  uploadBtn.addEventListener('click', function() {
    const name = newItemName.value.trim() || 'Custom item';
    const price = parseFloat(newItemPrice.value) || 129.99;
    const file = fileInput.files[0];

    // add to cart immediately
    cartItems.push(`${name} (R${price.toFixed(2)})`);
    updateCartDisplay();

    if (file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        // create a new product card dynamically (adds to grid, with category 'general')
        const grid = document.getElementById('productGrid');
        const newCard = document.createElement('div');
        newCard.className = 'product-card';
        newCard.dataset.category = 'all';
        newCard.dataset.productName = name;
        newCard.innerHTML = `
          <div class="product-image"><img src="${ev.target.result}" alt="${name}" loading="lazy"></div>
          <div class="product-title">${name}</div>
          <div class="product-price">${price.toFixed(2)}</div>
          <button class="add-btn" data-product="${name} (R${price.toFixed(2)})"><i class="fas fa-plus-circle"></i> Add</button>
        `;
        // attach add event
        newCard.querySelector('.add-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          cartItems.push(name);
          updateCartDisplay();
          showToast(`➕ ${name} added`);
        });
        grid.appendChild(newCard);
        showToast(`🖼️ New item "${name}" added with picture`);
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
      uploadStatus.innerHTML = `<i class="fa-regular fa-eye"></i> no file`;
    } else {
      // just add text item (no pic) – also create a card placeholder? we'll add a generic one
      const grid = document.getElementById('productGrid');
      const newCard = document.createElement('div');
      newCard.className = 'product-card';
      newCard.dataset.category = 'all';
      newCard.dataset.productName = name;
      newCard.innerHTML = `
        <div class="product-image"><i class="fas fa-box" style="font-size:3rem; color:#853f1a;"></i></div>
        <div class="product-title">${name}</div>
        <div class="product-price">${price.toFixed(2)}</div>
        <button class="add-btn" data-product="${name} (R${price.toFixed(2)})"><i class="fas fa-plus-circle"></i> Add</button>
      `;
      newCard.querySelector('.add-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        cartItems.push(name);
        updateCartDisplay();
        showToast(`➕ ${name} added`);
      });
      grid.appendChild(newCard);
      showToast(`📦 "${name}" added (no picture)`);
    }
    // reset fields
    newItemName.value = ''; newItemPrice.value = '129.99';
  });

  // file input status
  fileInput.addEventListener('change', function() {
    if (this.files && this.files[0]) uploadStatus.innerHTML = `<i class="fas fa-check-circle"></i> ${this.files[0].name.substring(0,15)}...`;
    else uploadStatus.innerHTML = `<i class="fa-regular fa-eye"></i> no file`;
  });

  // initial filter all
  filterCategory('all');
  updateCartDisplay();
})();
</script>
<!-- no footer attribution – clean as requested -->
</body>
</html>
